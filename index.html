function renderNav(){q('#clientNav').innerHTML=data.clients.map((c,i)=>`<button class="client-btn ${i===client?'active':''}" onclick="client=${i};week=0;render()">${c.name}</button>`).join('');}
function renderTabs(){q('#weekTabs').innerHTML=data.clients[client].weeks.map((w,i)=>`<button class="tab ${i===week?'active':''}" onclick="week=${i};render()">${w.name}</button>`).join('');}
function render(){const c=data.clients[client], w=c.weeks[week]; q('#heroWeek').textContent=w.name; q('#heroTitle').textContent=`${c.name} · programme mobile`; q('#heroText').textContent=`${c.summary} Objectif : baisse du poids et du tour de taille avec structure simple, salle Basic-Fit et récupération tenue.`; q('#heroSessions').textContent=w.sessions; q('#heroWater').textContent=c.water; q('#heroSteps').textContent=c.steps; q('#metaGrid').innerHTML=[['Poids',c.weight],['Taille',c.height],['Âge',c.age+' ans'],['Protéines',c.protein],['Déficit',c.calories],['Sommeil',c.sleep]].map(([a,b])=>`<div class="mini"><small>${a}</small><strong>${b}</strong></div>`).join(''); q('#weekRules').innerHTML=w.rules.map(r=>`<span class="pill">${r}</span>`).join(''); q('#days').innerHTML=w.days.map(d=>`<article class="day"><div class="day-head"><div><h3>${d.d} · ${d.t}</h3><small>${d.m}</small></div><span class="badge">${w.name}</span></div><div class="chips">${d.c.map(x=>`<span class="chip">${x}</span>`).join('')}</div><ul>${d.b.map(x=>`<li>${x}</li>`).join('')}</ul></article>`).join(''); q('#nutrition').innerHTML=w.nutrition.map(x=>`<li>${x}</li>`).join('')+`<li><strong>Repère protéines :</strong> ${c.protein} par jour.</li>`; q('#recovery').innerHTML=w.recovery.map(x=>`<li>${x}</li>`).join('')+`<li><strong>Eau :</strong> ${c.water} par jour.</li><li><strong>Pas :</strong> viser ${c.steps} malgré le travail physique.</li>`; renderNav(); renderTabs();}
(function(){const t=q('#themeBtn'),r=document.documentElement;let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';r.setAttribute('data-theme',d);t.textContent=d==='dark'?'☀':'☾';t.onclick=()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);t.textContent=d==='dark'?'☀':'☾';};})();
render();
</script>
</body>
</html>
